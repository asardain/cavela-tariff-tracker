<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cavela Tariff Tracker</title>

  <!-- Typography: Inter via Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- D3 v7 via CDN -->
  <script src="https://unpkg.com/d3@7/dist/d3.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div id="app"></div>

  <!--
    Module entrypoint.
    dashboard.js imports views, views import marks.js and data.js.
    All modules use ES module import/export.

    NOTE: When serving locally, use a static file server (not file://) to enable
    ES module imports and fetch() for data files.

    Quick start:
      python3 -m http.server 8080
    Then open http://localhost:8080/viz/
  -->
  <script type="module" src="src/dashboard.js"></script>
</body>
</html>
